<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#667eea;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#heroGrad)"/>
  
  <!-- 装饰性元素 -->
  <circle cx="200" cy="200" r="150" fill="white" opacity="0.05"/>
  <circle cx="1700" cy="300" r="200" fill="white" opacity="0.05"/>
  <circle cx="300" cy="800" r="100" fill="white" opacity="0.05"/>
  <circle cx="1600" cy="900" r="180" fill="white" opacity="0.05"/>
  
  <!-- 网格图案 -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
  </pattern>
  <rect width="1920" height="1080" fill="url(#grid)"/>
</svg>
